env:
  TERM: xterm-256color

window:
  opacity: 0.9
  padding:
    x: 2
    y: 2
  dynamic_padding: true

scrolling:
  history: 10000
  multiplier: 8

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: Cascadia Mono
    style: Bold
  italic:
    family: Cascadia Mono
    style: Italic
  bold_italic:
    family: Cascadia Mono
    style: Bold Italic
  size: 10.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
  use_thin_strokes: true

draw_bold_text_with_bright_colors: true

schemes:
  sonokai: &sonokai
    primary:
      background: "#2c2e34"
      foreground: "#e2e2e3"
    normal:
      black: "#181819"
      red: "#fc5d7c"
      green: "#9ed072"
      yellow: "#e7c664"
      blue: "#76cce0"
      magenta: "#b39df3"
      cyan: "#f39660"
      white: "#e2e2e3"
