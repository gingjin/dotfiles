window:
  opacity: 0.9
  padding:
    x: 2
    y: 2
  dynamic_padding: true

scrolling:
  history: 10000
  multiplier: 8

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: Cascadia Mono
    style: Bold
  italic:
    family: Cascadia Mono
    style: Italic
  bold_italic:
    family: Cascadia Mono
    style: Bold Italic
  size: 10.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
  use_thin_strokes: true

draw_bold_text_with_bright_colors: true

