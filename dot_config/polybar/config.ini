[global/wm]
margin-top = 0
margin-bottom = 0

[colors]
bg = #cc222222
bg-alt = #444
fg = #dfdfdf
fg-alt = #555

blue = #81A1C1
cyan = #88C0D0
green = #A3BE8C
orange = #D08770
purple = #B48EAD
red = #BF616A
yellow = #EBCB8B

trans = #00000000
semi-trans-black = #aa000000

[bar/example]
wm-restack = bspwm
; wm-restack = i3
monitor = ${env:MONITOR:LVDS1}
width = 100%
height = 24
radius = 0
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
border-size = 2
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1

font-0 = Symbols Nerd Font:size=11;1
font-1 = Microsoft YaHei:fontformat=truetype:size=11:antialias=false;0
font-2 = Siji:pixelsize=10;1
font-3 = Material:pixelsize=10;0

; cursor-click = pointer
; cursor-scroll = ns-resize

[bar/top]
inherit = bar/example

modules-left = workspaces
modules-center = title
modules-right = date powermenu

enable-ipc = true

tray-maxsize = 14
tray-position = right
tray-padding = 1

[bar/bottom]
inherit = bar/example
bottom = true

; modules-left = workspaces title
modules-left = mpd
modules-center = 
modules-right = pulseaudio backlight wlan eth filesystem memory cpu battery temperature keyboard 

enable-ipc = true

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = true
enable-click = true
enable-scroll = false

; icon-0 = 1;ÔĆÉ
; icon-1 = 2;Óėę
; icon-2 = 3;Ôáģ
; icon-3 = 4;Óúé
; icon-4 = 5;ÓěÄ
icon-default = ÔĀė 

label-focused = %icon%
label-focused-padding = 1
label-focused-foreground = ${colors.green}

label-occupied = %icon%
label-occupied-padding = 1
label-occupied-foreground = ${colors.orange}

label-urgent = %icon%
label-urgent-padding = 1
label-urgent-foreground = ${colors.yellow}

label-empty = %icon%
label-empty-padding = 1

label-active = %icon%
label-active-padding = 1
label-active-foreground = ${colors.red}

format = <label-state>
format-background = ${colors.bg}

[module/title]
type = internal/xwindow
label = %title%
label-maxlen = 40
label-empty = ""

format = <label>

[module/mpd]
type = internal/mpd
label-song = " %artist%-%title%"
label-time = %elapsed% / %total%

icon-play = Ô§Č
icon-pause = Ô££
icon-stop = Ôßö
icon-prev = Ô¶≠
icon-next = Ô¶¨

format-online = <label-song> <icon-prev> <icon-stop> <toggle> <icon-next>
format-online-prefix = "ÔÄ• "

label-song-maxlen = 25
label-song-ellipsis = true


[module/keyboard]
type = internal/xkeyboard

blacklist-0 = num lock
label-layout = " %layout%"

label-indicator-padding = 1
label-indicator-margin = 1
label-indicator-background = ${colors.red}

format = <label-layout> <label-indicator>
format-prefix = ÔĄú
format-prefix-foreground = ${colors.fg-alt}


[module/filesystem]
type = internal/fs
interval = 30

mount-0 = /
fixed-values = true

label-mounted = " %free%"
format-mounted = <label-mounted>
format-mounted-prefix = ÔüČ
format-mounted-prefix-foreground = ${colors.fg-alt}

label-unmounted = " %mountpoint%: not mounted"
format-unmounted = <label-unmounted>
format-unmounted-prefix = Ôõź

[module/backlight]
type = internal/xbacklight
card = intel_backlight

ramp-0 = Ôóõ
ramp-1 = Ôóú
ramp-2 = ÔóĚ
ramp-3 = Ôóě
ramp-4 = Ôóü
label = %percentage%%
format = <ramp> <label>

[module/cpu]
type = internal/cpu
interval = 1

format = <label>
format-prefix = ÔÖĽ 
format-prefix-foreground = ${colors.fg-alt}
label = " CPU %percentage%%"

[module/memory]
type = internal/memory
interval = 1
format = <label>
format-prefix = ÔÖÖ 
format-prefix-foreground = ${colors.fg-alt}
label = " RAM %percentage_used%%"

[module/wlan]
type = internal/network
interface = wlan0
interval = 1

accumulate-stats = true
unknown-as-up = true

ramp-signal-0 = Ôáę
ramp-signal-foreground = ${colors.fg-alt}

label-connected = "%essid% Ôõô %downspeed%"
format-connected = <ramp-signal> <label-connected>

[module/eth]
type = internal/network
interface = enp3s0
interval = 1.0

label-connected = %local_ip%

[module/date]
type = internal/date
interval = 1
date = %A, %Y-%m-%d, %H:%M:%S%

[module/pulseaudio]
type = internal/pulseaudio

label-volume = %percentage%%

format-volume = <bar-volume> <label-volume> 

format-muted = <label-muted>
format-muted-prefix = "ÔĎ¶ "

bar-volume-width = 10
bar-volume-foreground-0 = #55aa55
bar-volume-foreground-1 = #55aa55
bar-volume-foreground-2 = #55aa55
bar-volume-foreground-3 = #55aa55
bar-volume-foreground-4 = #55aa55
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = false
bar-volume-indicator = |
bar-volume-indicator-font = 2
bar-volume-fill = ‚ĒÄ
bar-volume-fill-font = 2
bar-volume-empty = ‚ĒÄ
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.fg-alt}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98

format-charging = <animation-charging> <label-charging>

format-discharging = <ramp-capacity> <label-discharging>

label-full = "Full"
format-full = <label-full>
format-full-prefix = ÔČÄ 
format-full-prefix-foreground = ${colors.fg-alt}

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-foreground = ${colors.fg-alt}

animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-foreground = ${colors.fg-alt}
animation-charging-framerate = 750

animation-discharging-0 = ÔČĄ
animation-discharging-1 = ÔČÉ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČĀ
animation-discharging-4 = ÔČÄ
animation-discharging-foreground = ${colors.fg-alt}
animation-discharging-framerate = 750

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

ramp-0 = Ôčč
ramp-1 = Ôčä
ramp-2 = ÔčČ
ramp-3 = Ôčą
ramp-4 = Ôčá
ramp-foreground = ${colors.fg-alt}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.red}

format = <ramp> <label>
format-warn = <ramp> <label-warn>

[module/powermenu]
type = custom/menu
expand-right = true

format-spacing = 0

label-open = ÔÄĎ
label-open-foreground = ${colors.red}
label-close = ÔÄćcancel
label-close-foreground = ${colors.red}
label-separator = "|"
label-separator-foreground = ${colors.fg-alt}

menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = shutdown
menu-0-1-exec = menu-open-2
menu-0-2 = lock
menu-0-2-exec = menu-open-3

menu-1-0 = back
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = shutdown -r now
menu-2-0 = back
menu-2-0-exec = menu-open-0
menu-2-1 = shutdown
menu-2-1-exec = shutdown -h now
menu-3-0 = back
menu-3-0-exec = menu-open-0
menu-3-1 = lock
menu-3-1-exec = i3lock-fancy

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
pseudo-transparency = true

; vim:ft=dosini
